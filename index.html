<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>my journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8;
      --surface: #f2f1ee;
      --border: #e4e2dc;
      --text: #1a1a18;
      --muted: #7a7870;
      --thumb-bg: #e8e6e0;
    }
    body { font-family: 'Nanum Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1.6rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--bg); z-index: 10;
    }
    .nav-admin { font-size: 13px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-admin:hover { color: var(--text); }

    .hero { max-width: 780px; margin: 0 auto; padding: 3rem 2.5rem 2rem; }
    .hero-date { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }

    .posts { max-width: 780px; margin: 0 auto; padding: 0 2.5rem 5rem; }

    .post-card {
      display: grid;
      grid-template-columns: 1fr 148px;
      gap: 1.75rem;
      padding: 1.75rem 0;
      border-top: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
      cursor: pointer;
    }
    .post-card:hover { opacity: 0.6; }
    .post-card:last-child { border-bottom: 1px solid var(--border); }
    .post-card.text-only { grid-template-columns: 1fr; }

    .post-info { display: flex; flex-direction: column; justify-content: center; gap: 8px; }
    .post-date { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
    .post-title { font-size: 17px; font-weight: 700; line-height: 1.5; }
    .post-excerpt { font-size: 13px; color: var(--muted); line-height: 1.7; }

    .post-thumb {
      width: 148px; height: 100px;
      border-radius: 4px; overflow: hidden;
      background: var(--thumb-bg);
      flex-shrink: 0; align-self: center;
    }
    .post-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .post-thumb-empty { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .post-thumb-empty svg { opacity: 0.2; }

    .write-btn {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--text); color: var(--bg);
      border: none; border-radius: 99px;
      padding: 12px 22px;
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 13px; cursor: pointer;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .write-btn:hover { opacity: 0.75; transform: translateY(-1px); }

    .loading { text-align: center; padding: 4rem; color: var(--muted); font-size: 14px; }
    .empty { text-align: center; padding: 4rem; color: var(--muted); font-size: 14px; }

    /* 글 상세 페이지 */
    #post-view { display: none; max-width: 780px; margin: 0 auto; padding: 3rem 2.5rem 5rem; }
    .back-btn { font-size: 13px; color: var(--muted); cursor: pointer; margin-bottom: 2.5rem; display: inline-flex; align-items: center; gap: 6px; background: none; border: none; font-family: 'Nanum Gothic', sans-serif; }
    .back-btn:hover { color: var(--text); }
    .post-view-date { font-size: 12px; color: var(--muted); margin-bottom: 1rem; }
    .post-view-title { font-size: 26px; font-weight: 700; line-height: 1.4; margin-bottom: 2rem; }
    .post-view-image { width: 100%; max-height: 480px; object-fit: cover; border-radius: 6px; margin-bottom: 2rem; }
    .post-view-content { font-size: 15px; line-height: 1.9; color: var(--text); white-space: pre-wrap; }

    #list-view { display: block; }

    @media (max-width: 560px) {
      nav { padding: 1.2rem 1.25rem; }
      .hero, .posts { padding-left: 1.25rem; padding-right: 1.25rem; }
      .post-card { grid-template-columns: 1fr 96px; gap: 1rem; }
      .post-thumb { width: 96px; height: 72px; }
      #post-view { padding-left: 1.25rem; padding-right: 1.25rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-admin" href="admin.html">관리자</a>
</nav>

<!-- 목록 화면 -->
<div id="list-view">
  <div class="hero">
    <p class="hero-date" id="current-date"></p>
  </div>
  <div class="posts" id="posts-container">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<!-- 글 상세 화면 -->
<div id="post-view">
  <button class="back-btn" onclick="showList()">← 목록으로</button>
  <p class="post-view-date" id="view-date"></p>
  <h1 class="post-view-title" id="view-title"></h1>
  <img class="post-view-image" id="view-image" style="display:none" />
  <div class="post-view-content" id="view-content"></div>
</div>

<a class="write-btn" href="admin.html">＋ 새 글 쓰기</a>

<script>
  const SUPABASE_URL = 'https://qhgfmppamzzhhkflsufz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZ2ZtcHBhbXp6aGhrZmxzdWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjAyODIsImV4cCI6MjA5MTYzNjI4Mn0.rirTdPvZXhha0kIZqR8q2bSqo1Cwsn96RTga9LFWjtg';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 현재 년월 표시
  const now = new Date();
  document.getElementById('current-date').textContent =
    `${now.getFullYear()}년 ${now.getMonth() + 1}월`;

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}. ${String(d.getMonth()+1).padStart(2,'0')}. ${String(d.getDate()).padStart(2,'0')}`;
  }

  function excerpt(text, len = 80) {
    if (!text) return '';
    return text.length > len ? text.slice(0, len) + '...' : text;
  }

  async function loadPosts() {
    const { data, error } = await supabase
      .from('posts')
      .select('*')
      .order('created_at', { ascending: false });

    const container = document.getElementById('posts-container');

    if (error || !data || data.length === 0) {
      container.innerHTML = '<div class="empty">아직 작성된 글이 없어요.</div>';
      return;
    }

    container.innerHTML = data.map(post => {
      const hasImage = !!post.image_url;
      return `
        <div class="post-card ${hasImage ? '' : 'text-only'}" onclick="showPost(${JSON.stringify(post).replace(/"/g, '&quot;')})">
          <div class="post-info">
            <span class="post-date">${formatDate(post.created_at)}</span>
            <h2 class="post-title">${post.title}</h2>
            <p class="post-excerpt">${excerpt(post.content)}</p>
          </div>
          ${hasImage ? `
          <div class="post-thumb">
            <img src="${post.image_url}" alt="${post.title}" />
          </div>` : ''}
        </div>
      `;
    }).join('');
  }

  function showPost(post) {
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('post-view').style.display = 'block';
    document.getElementById('view-date').textContent = formatDate(post.created_at);
    document.getElementById('view-title').textContent = post.title;
    document.getElementById('view-content').textContent = post.content || '';
    const img = document.getElementById('view-image');
    if (post.image_url) {
      img.src = post.image_url;
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }
    window.scrollTo(0, 0);
  }

  function showList() {
    document.getElementById('post-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    window.scrollTo(0, 0);
  }

  loadPosts();
</script>
</body>
</html>
