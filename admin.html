<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 — belongy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #fafaf8; --surface: #f2f1ee; --border: #e4e2dc; --text: #1a1a18; --muted: #7a7870; --danger: #c0392b; }
    body { font-family: 'Nanum Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.4rem 2.5rem; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
    .nav-title { font-size: 15px; font-weight: 700; }
    .nav-home { font-size: 13px; color: var(--muted); text-decoration: none; }
    .nav-home:hover { color: var(--text); }
    #auth-screen { max-width: 360px; margin: 8rem auto; padding: 0 2rem; display: flex; flex-direction: column; gap: 1rem; }
    #auth-screen h2 { font-size: 18px; font-weight: 700; }
    #auth-screen p { font-size: 13px; color: var(--muted); }
    input[type="text"], input[type="password"], input[type="url"] { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Nanum Gothic', sans-serif; font-size: 14px; background: white; color: var(--text); outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--text); }
    button { padding: 10px 20px; border-radius: 6px; font-family: 'Nanum Gothic', sans-serif; font-size: 14px; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary { background: var(--text); color: var(--bg); border: none; font-weight: 700; }
    .btn-primary:hover { opacity: 0.75; }
    .btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface); }
    .btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); font-size: 12px; padding: 6px 12px; }
    .btn-danger:hover { background: #fff0ee; }
    .btn-tool { background: white; color: var(--text); border: 1px solid var(--border); padding: 5px 10px; font-size: 13px; border-radius: 4px; }
    .btn-tool:hover { background: var(--surface); }
    #admin-screen { display: none; }
    .write-section { max-width: 780px; margin: 0 auto; padding: 2.5rem 2.5rem 1.5rem; border-bottom: 1px solid var(--border); }
    .write-section h2 { font-size: 16px; font-weight: 700; margin-bottom: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }
    .form-label { font-size: 12px; color: var(--muted); letter-spacing: 0.04em; }
    .editor-toolbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; background: var(--surface); }
    .toolbar-sep { width: 1px; background: var(--border); margin: 2px 4px; }
    .editor-body { min-height: 300px; padding: 14px; border: 1px solid var(--border); border-radius: 0 0 6px 6px; background: white; outline: none; font-family: 'Nanum Gothic', sans-serif; font-size: 14px; line-height: 1.8; color: var(--text); }
    .editor-body:focus { border-color: var(--text); }
    .editor-body a { color: #2563eb; text-decoration: underline; }
    .editor-body p { margin-bottom: 0.5rem; }
    .editor-body img { max-width: 100%; height: auto; border-radius: 4px; margin: 8px 0; display: block; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
    .editor-body img.thumb-selected { border-color: #f59e0b; }
    .thumb-preview { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .thumb-preview img { width: 60px; height: 44px; object-fit: cover; border-radius: 4px; border: 2px solid #f59e0b; }
    .thumb-preview span { font-size: 12px; color: var(--muted); }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal-box { background: white; border-radius: 10px; padding: 1.5rem; width: 340px; display: flex; flex-direction: column; gap: 0.75rem; }
    .modal-box h3 { font-size: 15px; font-weight: 700; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.25rem; }
    .form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; }
    .posts-section { max-width: 780px; margin: 0 auto; padding: 2rem 2.5rem; border-bottom: 1px solid var(--border); }
    .posts-section h2 { font-size: 16px; font-weight: 700; margin-bottom: 1.5rem; }
    .post-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-top: 1px solid var(--border); gap: 1rem; }
    .post-item:last-child { border-bottom: 1px solid var(--border); }
    .post-item-info { flex: 1; }
    .post-item-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .post-item-date { font-size: 12px; color: var(--muted); }
    .post-item-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    /* 메모 섹션 */
    .memos-section { max-width: 780px; margin: 0 auto; padding: 2rem 2.5rem 5rem; }
    .memos-section h2 { font-size: 16px; font-weight: 700; margin-bottom: 1.5rem; }
    .memo-item { padding: 1rem 0; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
    .memo-item:last-child { border-bottom: 1px solid var(--border); }
    .memo-item-body { flex: 1; }
    .memo-item-message { font-size: 14px; line-height: 1.7; margin-bottom: 6px; white-space: pre-wrap; }
    .memo-item-date { font-size: 12px; color: var(--muted); }
    .memo-item-actions { flex-shrink: 0; }

    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 99px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
    .toast.show { opacity: 1; }
    .loading, .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
    @media (max-width: 560px) { nav, .write-section, .posts-section, .memos-section { padding-left: 1.25rem; padding-right: 1.25rem; } }
  </style>
</head>
<body>
<nav>
  <span class="nav-title">관리자</span>
  <a class="nav-home" href="index.html">← 사이트로</a>
</nav>

<div id="auth-screen">
  <h2>관리자 로그인</h2>
  <p>비밀번호를 입력해주세요</p>
  <input type="password" id="password-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter') login()" />
  <button class="btn-primary" onclick="login()">로그인</button>
  <p id="auth-error" style="color:#c0392b;font-size:13px;display:none;">비밀번호가 틀렸어요</p>
</div>

<div id="admin-screen">
  <div class="write-section">
    <h2 id="form-title">새 글 쓰기</h2>
    <div class="form-group">
      <span class="form-label">제목</span>
      <input type="text" id="input-title" placeholder="제목을 입력하세요" />
    </div>
    <div class="form-group">
      <span class="form-label">내용 — 사진 버튼으로 원하는 위치에 사진 삽입 / 삽입된 사진 클릭하면 썸네일 설정</span>
      <div class="editor-toolbar">
        <button class="btn-tool" onmousedown="event.preventDefault(); fmt('bold')"><b>B</b></button>
        <button class="btn-tool" onmousedown="event.preventDefault(); fmt('italic')"><i>I</i></button>
        <button class="btn-tool" onmousedown="event.preventDefault(); fmt('underline')"><u>U</u></button>
        <div class="toolbar-sep"></div>
        <button class="btn-tool" onmousedown="event.preventDefault(); openLinkModal()">링크</button>
        <button class="btn-tool" onmousedown="event.preventDefault(); fmt('insertUnorderedList')">목록</button>
        <div class="toolbar-sep"></div>
        <button class="btn-tool" onmousedown="event.preventDefault(); triggerImageInsert()">사진</button>
        <div class="toolbar-sep"></div>
        <button class="btn-tool" onmousedown="event.preventDefault(); fmt('removeFormat')">서식제거</button>
      </div>
      <div class="editor-body" id="editor" contenteditable="true"></div>
      <input type="file" id="img-insert-input" accept="image/*" style="display:none" onchange="insertImageAtCursor(event)" />
    </div>
    <div class="form-group" id="thumb-section" style="display:none">
      <span class="form-label">썸네일</span>
      <div class="thumb-preview">
        <img id="thumb-preview-img" src="" />
        <span>썸네일로 설정됨 (변경하려면 다른 사진 클릭)</span>
      </div>
    </div>
    <input type="hidden" id="edit-id" />
    <input type="hidden" id="thumb-url" />
    <div class="form-actions">
      <button class="btn-secondary" onclick="resetForm()">취소</button>
      <button class="btn-primary" onclick="savePost()">저장하기</button>
    </div>
  </div>

  <div class="posts-section">
    <h2>작성한 글</h2>
    <div id="admin-posts-container"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- 메모 섹션 -->
  <div class="memos-section">
    <h2>받은 메모</h2>
    <div id="memos-container"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<div class="modal-bg" id="link-modal">
  <div class="modal-box">
    <h3>링크 삽입</h3>
    <input type="text" id="link-text" placeholder="표시할 텍스트" />
    <input type="url" id="link-url" placeholder="https://..." />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeLinkModal()">취소</button>
      <button class="btn-primary" onclick="insertLink()">삽입</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const db = window.supabase.createClient(
    'https://qhgfmppamzzhhkflsufz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZ2ZtcHBhbXp6aGhrZmxzdWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjAyODIsImV4cCI6MjA5MTYzNjI4Mn0.rirTdPvZXhha0kIZqR8q2bSqo1Cwsn96RTga9LFWjtg'
  );
  const ADMIN_PASSWORD = 'ahrtjdrP0324@1m';
  let savedRange = null;

  function login() {
    const pw = document.getElementById('password-input').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadAdminPosts();
      loadMemos();
    } else {
      document.getElementById('auth-error').style.display = 'block';
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.getFullYear() + '. ' + String(d.getMonth()+1).padStart(2,'0') + '. ' + String(d.getDate()).padStart(2,'0');
  }

  function fmt(cmd) {
    document.getElementById('editor').focus();
    document.execCommand(cmd, false, null);
  }

  function triggerImageInsert() {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();
    document.getElementById('img-insert-input').click();
  }

  async function insertImageAtCursor(e) {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    showToast('사진 업로드 중...');
    try {
      const url = await uploadImg(file);
      const editor = document.getElementById('editor');
      editor.focus();
      if (savedRange) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(savedRange);
      }
      document.execCommand('insertHTML', false, '<img src="' + url + '" data-url="' + url + '" /><br>');
      showToast('사진이 삽입됐어요!');
      setupImageClicks();
    } catch(err) {
      showToast('사진 업로드 실패. 다시 시도해주세요.');
    }
  }

  function setupImageClicks() {
    document.getElementById('editor').querySelectorAll('img').forEach(img => {
      img.onclick = function(e) {
        e.preventDefault();
        document.querySelectorAll('#editor img').forEach(i => i.classList.remove('thumb-selected'));
        img.classList.add('thumb-selected');
        const url = img.getAttribute('data-url') || img.src;
        document.getElementById('thumb-url').value = url;
        document.getElementById('thumb-preview-img').src = url;
        document.getElementById('thumb-section').style.display = 'block';
        showToast('썸네일로 설정됐어요!');
      };
    });
  }

  function openLinkModal() {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();
    document.getElementById('link-text').value = sel ? sel.toString() : '';
    document.getElementById('link-url').value = '';
    document.getElementById('link-modal').classList.add('open');
    setTimeout(() => document.getElementById('link-url').focus(), 100);
  }

  function closeLinkModal() {
    document.getElementById('link-modal').classList.remove('open');
  }

  function insertLink() {
    const text = document.getElementById('link-text').value.trim();
    const url = document.getElementById('link-url').value.trim();
    if (!url) { showToast('URL을 입력해주세요'); return; }
    document.getElementById('editor').focus();
    if (savedRange) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(savedRange);
    }
    document.execCommand('insertHTML', false, '<a href="' + url + '" target="_blank">' + (text || url) + '</a>');
    closeLinkModal();
  }

  async function uploadImg(file) {
    const ext = file.name.split('.').pop();
    const name = Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + ext;
    const { error } = await db.storage.from('images').upload(name, file, { upsert: true });
    if (error) throw error;
    return db.storage.from('images').getPublicUrl(name).data.publicUrl;
  }

  async function savePost() {
    const title = document.getElementById('input-title').value.trim();
    const content = document.getElementById('editor').innerHTML.trim();
    const editId = document.getElementById('edit-id').value;
    const thumbUrl = document.getElementById('thumb-url').value;
    if (!title) { showToast('제목을 입력해주세요'); return; }
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = content;
    const images = Array.from(tempDiv.querySelectorAll('img')).map(img => img.getAttribute('data-url') || img.src);
    const payload = { title, content, image_url: thumbUrl || (images[0] || null), images };
    showToast('저장 중...');
    try {
      if (editId) {
        await db.from('posts').update(payload).eq('id', editId);
        showToast('수정됐어요!');
      } else {
        await db.from('posts').insert(payload);
        showToast('저장됐어요!');
      }
      resetForm();
      loadAdminPosts();
    } catch(e) {
      showToast('오류가 났어요. 다시 시도해주세요.');
    }
  }

  function resetForm() {
    document.getElementById('form-title').textContent = '새 글 쓰기';
    document.getElementById('input-title').value = '';
    document.getElementById('editor').innerHTML = '';
    document.getElementById('edit-id').value = '';
    document.getElementById('thumb-url').value = '';
    document.getElementById('thumb-section').style.display = 'none';
  }

  function editPost(post) {
    document.getElementById('form-title').textContent = '글 수정';
    document.getElementById('input-title').value = post.title;
    document.getElementById('editor').innerHTML = post.content || '';
    document.getElementById('edit-id').value = post.id;
    document.getElementById('thumb-url').value = post.image_url || '';
    if (post.image_url) {
      document.getElementById('thumb-preview-img').src = post.image_url;
      document.getElementById('thumb-section').style.display = 'block';
    }
    setupImageClicks();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function deletePost(id) {
    if (!confirm('정말 삭제할까요?')) return;
    await db.from('posts').delete().eq('id', id);
    showToast('삭제됐어요');
    loadAdminPosts();
  }

  async function loadAdminPosts() {
    const { data } = await db.from('posts').select('*').order('created_at', { ascending: false });
    const c = document.getElementById('admin-posts-container');
    if (!data || !data.length) { c.innerHTML = '<div class="empty">아직 작성된 글이 없어요.</div>'; return; }
    c.innerHTML = data.map(post => '<div class="post-item"><div class="post-item-info"><div class="post-item-title">' + post.title + '</div><div class="post-item-date">' + formatDate(post.created_at) + '</div></div><div class="post-item-actions"><button class="btn-secondary" style="font-size:12px;padding:6px 12px" onclick=\'editPost(' + JSON.stringify(post).replace(/'/g,"&#39;") + ')\'>수정</button><button class="btn-danger" onclick="deletePost(\'' + post.id + '\')">삭제</button></div></div>').join('');
  }

  /* 메모 불러오기 & 삭제 */
  async function loadMemos() {
    const c = document.getElementById('memos-container');
    const { data, error } = await db.from('memos').select('*').order('created_at', { ascending: false });
    if (error || !data || !data.length) {
      c.innerHTML = '<div class="empty">아직 받은 메모가 없어요.</div>';
      return;
    }
    c.innerHTML = data.map(memo => `
      <div class="memo-item" id="memo-${memo.id}">
        <div class="memo-item-body">
          <div class="memo-item-message">${escapeHtml(memo.message)}</div>
          <div class="memo-item-date">${formatDate(memo.created_at)}</div>
        </div>
        <div class="memo-item-actions">
          <button class="btn-danger" onclick="deleteMemo('${memo.id}')">삭제</button>
        </div>
      </div>
    `).join('');
  }

  async function deleteMemo(id) {
    if (!confirm('이 메모를 삭제할까요?')) return;
    const { error } = await db.from('memos').delete().eq('id', id);
    if (!error) {
      document.getElementById('memo-' + id)?.remove();
      const c = document.getElementById('memos-container');
      if (!c.querySelector('.memo-item')) c.innerHTML = '<div class="empty">아직 받은 메모가 없어요.</div>';
      showToast('삭제됐어요');
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
